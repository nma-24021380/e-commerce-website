<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Store | Mua sắm thông minh</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">ZenithStore.</a>
      <nav class="nav-links">
        <a href="index.html" class="active">Sản phẩm</a>
        <a href="cart.html" class="cart-link">
          Giỏ hàng
          <span class="cart-count" id="cart-count" style="display: none;">0</span>
        </a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">Sản phẩm nổi bật</h1>
    <div class="category-filters" id="category-filters" style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;">
      <!-- Nút phân loại sẽ render ở đây -->
    </div>
    <div id="product-list" class="product-grid">
      <!-- Sản phẩm sẽ được render ở đây qua JavaScript -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Zenith Store. Không có bản quyền (Demo).</p>
  </footer>

  <script src="js/data.js"></script>
  <script>
    let currentCategoryFilter = 'All';

    function renderCategoryFilters() {
      const products = getProducts();
      // Lấy danh sách unique category
      const categories = ['All', ...new Set(products.map(p => p.category).filter(Boolean))];
      
      const filterContainer = document.getElementById('category-filters');
      filterContainer.innerHTML = categories.map(cat => `
        <button class="btn ${currentCategoryFilter === cat ? 'btn-primary' : 'btn-outline'}" 
                style="padding: 0.5rem 1rem; border-radius: 20px;" 
                onclick="filterByCategory('${cat}')">
          ${cat}
        </button>
      `).join('');
    }

    function filterByCategory(category) {
      currentCategoryFilter = category;
      renderCategoryFilters();
      renderProducts();
    }

    function renderProducts() {
      const productList = document.getElementById('product-list');
      let products = getProducts();
      
      if (currentCategoryFilter !== 'All') {
        products = products.filter(p => p.category === currentCategoryFilter);
      }
      
      if (products.length === 0) {
        productList.innerHTML = '<p class="text-center" style="grid-column: 1 / -1; color: var(--text-muted)">Không có sản phẩm nào cho danh mục này.</p>';
        return;
      }

      productList.innerHTML = products.map(product => {
        const outOfStock = product.stock <= 0;
        return `
        <div class="product-card">
          <a href="product.html?id=${product.id}" style="position: relative; display: block;">
            <img src="${product.image}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image';">
            <span style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 0.25rem 0.5rem; font-size: 0.75rem; border-radius: 4px;">
              ${product.category || 'Khác'}
            </span>
            ${outOfStock ? '<span style="position: absolute; top: 10px; left: 10px; background: var(--danger-color); color: white; padding: 0.25rem 0.5rem; font-size: 0.75rem; border-radius: 4px; font-weight: bold;">HẾT HÀNG</span>' : ''}
          </a>
          <div class="product-info">
            <a href="product.html?id=${product.id}" style="text-decoration: none; color: inherit;">
              <h2 class="product-title">${product.name}</h2>
            </a>
            <div class="product-desc">${product.desc}</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
              <div class="product-price" style="margin-bottom: 0;">${formatCurrency(product.price)}</div>
              <div style="font-size: 0.85rem; color: ${outOfStock ? 'var(--danger-color)' : 'var(--text-muted)'}; font-weight: 500;">
                Tồn kho: ${product.stock}
              </div>
            </div>
            <button class="btn btn-primary" style="width: 100%; opacity: ${outOfStock ? '0.5' : '1'}; cursor: ${outOfStock ? 'not-allowed' : 'pointer'};" 
                    onclick="addToCart(${product.id})" ${outOfStock ? 'disabled' : ''}>
              ${outOfStock ? 'Hết hàng' : 'Thêm vào giỏ'}
            </button>
          </div>
        </div>
      `}).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCategoryFilters();
      renderProducts();
    });
  </script>
</body>
</html>
